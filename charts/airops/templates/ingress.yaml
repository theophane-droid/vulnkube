apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "airops.fullname" . }}
  labels:
    {{- include "airops.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "traefik" | quote }}
  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.path | default "/" | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "airops.fullname" . }}-caddy
                port:
                  number: {{ .Values.caddy.service.port }}

          - path: {{ .Values.keycloak.ingressPath | default "/auth" | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "airops.fullname" . }}-keycloak
                port:
                  number: {{ .Values.keycloak.service.port }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "airops.fullname" . }}-minio-strip
spec:
  stripPrefix:
    prefixes:
      - /minio
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "airops.fullname" . }}-minio
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ include "airops.fullname" . }}-minio-strip@kubernetescrd
spec:
  ingressClassName: {{ .Values.ingress.className | default "traefik" | quote }}
  rules:
    - http:
        paths:
          - path: /minio
            pathType: Prefix
            backend:
              service:
                name: {{ include "airops.fullname" . }}-minio
                port:
                  name: console
