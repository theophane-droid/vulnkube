{{- if .Values.openldap.enabled }}
{{- if .Values.openldap.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "airops.fullname" . }}-openldap-data
  labels:
    {{- include "airops.labels" . | nindent 4 }}
    app.kubernetes.io/component: openldap
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.openldap.persistence.dataSize | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "airops.fullname" . }}-openldap-config
  labels:
    {{- include "airops.labels" . | nindent 4 }}
    app.kubernetes.io/component: openldap
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.openldap.persistence.configSize | quote }}
---
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "airops.fullname" . }}-openldap-bootstrap
  labels:
    {{- include "airops.labels" . | nindent 4 }}
    app.kubernetes.io/component: openldap
data:
  11-topgun-users.ldif: |
    dn: ou=people,dc=topgun,dc=local
    objectClass: organizationalUnit
    ou: people

    dn: ou=groups,dc=topgun,dc=local
    objectClass: organizationalUnit
    ou: groups

{{ range .Values.lab.operators }}
    dn: uid={{ .callsign }},ou=people,dc=topgun,dc=local
    objectClass: top
    objectClass: person
    objectClass: organizationalPerson
    objectClass: inetOrgPerson
    cn: {{ .displayName }}
    sn: {{ .callsign }}
    uid: {{ .callsign }}
    mail: {{ .email }}
    employeeType: {{ .role }}
    userPassword: {{ .password }}

{{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "airops.fullname" . }}-openldap
  labels:
    {{- include "airops.labels" . | nindent 4 }}
    app.kubernetes.io/component: openldap
spec:
  replicas: {{ .Values.openldap.replicaCount }}
  selector:
    matchLabels:
      {{- include "airops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: openldap
  template:
    metadata:
      labels:
        {{- include "airops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: openldap
      annotations:
        checksum/openldap-bootstrap: {{ toJson .Values.lab.operators | sha256sum }}
    spec:
      initContainers:
        - name: copy-bootstrap
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              cp /bootstrap-readonly/* /bootstrap-writable/
          volumeMounts:
            - name: bootstrap-readonly
              mountPath: /bootstrap-readonly
            - name: bootstrap
              mountPath: /bootstrap-writable

      containers:
        - name: openldap
          image: "{{ .Values.openldap.image.repository }}:{{ .Values.openldap.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 389
              name: ldap
          env:
            - name: LDAP_ORGANISATION
              value: {{ .Values.openldap.organization | quote }}

            - name: LDAP_DOMAIN
              value: {{ .Values.openldap.domain | quote }}

            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "airops.fullname" . }}-secrets
                  key: openldap-admin-password

            - name: LDAP_REMOVE_CONFIG_AFTER_SETUP
              value: "false"

          volumeMounts:
            - name: ldap-data
              mountPath: /var/lib/ldap

            - name: ldap-config
              mountPath: /etc/ldap/slapd.d

            - name: bootstrap
              mountPath: /container/service/slapd/assets/config/bootstrap/ldif/custom

          readinessProbe:
            tcpSocket:
              port: ldap
            initialDelaySeconds: 15
            periodSeconds: 10

          resources:
            {{- toYaml .Values.resources.openldap | nindent 12 }}

      volumes:
        - name: bootstrap-readonly
          configMap:
            name: {{ include "airops.fullname" . }}-openldap-bootstrap

        - name: bootstrap
          emptyDir: {}

        - name: ldap-data
          {{- if .Values.openldap.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "airops.fullname" . }}-openldap-data
          {{- else }}
          emptyDir: {}
          {{- end }}

        - name: ldap-config
          {{- if .Values.openldap.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "airops.fullname" . }}-openldap-config
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "airops.fullname" . }}-openldap
  labels:
    {{- include "airops.labels" . | nindent 4 }}
    app.kubernetes.io/component: openldap
spec:
  selector:
    {{- include "airops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: openldap
  ports:
    - name: ldap
      port: {{ .Values.openldap.service.port }}
      targetPort: ldap
{{- end }}
