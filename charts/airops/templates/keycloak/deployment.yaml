{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "airops.fullname" . }}-keycloak
  labels:
    {{- include "airops.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: {{ .Values.keycloak.replicaCount }}
  selector:
    matchLabels:
      {{- include "airops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        {{- include "airops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
      annotations:
        checksum/keycloak-realm: {{ include (print $.Template.BasePath "/keycloak/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - start
            - --http-port=8080
            - --http-relative-path=/auth
            - --hostname-strict=false
            - --import-realm

          ports:
            - containerPort: 8080
              name: http

          env:
            - name: KC_DB
              value: postgres

            - name: KC_DB_URL
              value: jdbc:postgresql://{{ include "airops.fullname" . }}-postgresql:5432/{{ .Values.keycloak.db.database }}

            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.db.username | quote }}

            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "airops.fullname" . }}-secrets
                  key: keycloak-db-password

            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.admin.username | quote }}

            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "airops.fullname" . }}-secrets
                  key: keycloak-admin-password

            - name: KC_PROXY_HEADERS
              value: xforwarded

            - name: KC_HTTP_ENABLED
              value: "true"

            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"

          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          resources:
            {{- toYaml .Values.resources.keycloak | nindent 12 }}

      volumes:
        - name: realm
          configMap:
            name: {{ include "airops.fullname" . }}-keycloak-realm
{{- end }}
