apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "airops.fullname" . }}-caddy
  labels:
    {{- include "airops.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
spec:
  replicas: {{ .Values.caddy.replicaCount }}
  selector:
    matchLabels:
      {{- include "airops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: caddy
  template:
    metadata:
      labels:
        {{- include "airops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: caddy
      annotations:
        checksum/caddy-config: {{ include (print $.Template.BasePath "/caddy-config.yaml") . | sha256sum }}
    spec:
      containers:
        - name: caddy
          image: "{{ .Values.caddy.image.repository }}:{{ .Values.caddy.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: {{ include "airops.fullname" . }}-caddy
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "airops.fullname" . }}-caddy
  labels:
    {{- include "airops.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
spec:
  type: {{ .Values.caddy.service.type }}
  selector:
    {{- include "airops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
  ports:
    - name: http
      port: {{ .Values.caddy.service.port }}
      targetPort: http
      {{- if eq .Values.caddy.service.type "NodePort" }}
      nodePort: {{ .Values.caddy.service.nodePort }}
      {{- end }}
